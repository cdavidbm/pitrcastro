  - name: notificaciones-traslados
    label: ATENCIÓN Y SERVICIOS
    files:
      - name: edictos
        label: Edictos (Notificaciones Supletorias)
        file: src/content/notificaciones/edictos.json
        fields:
          - name: entries
            label: Edictos
            widget: list
            label_singular: Edicto
            collapsed: true
            summary: "{{fields.expediente}} — {{fields.tipoAuto}} ({{fields.vigencia}})"
            fields: &shared_4
              - name: expediente
                label: Número del expediente
                widget: string
                required: true
              - name: tipoAuto
                label: Tipo de auto
                widget: string
                required: true
              - name: tipoNotificacion
                label: Tipo de notificación / traslado
                widget: string
                required: true
              - name: dependencia
                label: Dependencia que profiere el acto
                widget: string
                required: true
              - name: fechaAuto
                label: Fecha del auto
                widget: string
                required: false
                hint: "Formato: DD/MM/AAAA"
              - name: desde
                label: Desde
                widget: string
                required: false
                hint: "Formato: DD/MM/AAAA"
              - name: hasta
                label: Hasta
                widget: string
                required: false
                hint: "Formato: DD/MM/AAAA"
              - name: pdfUrl
                label: URL del auto (PDF)
                widget: string
                required: false
              - name: vigencia
                label: Vigencia (Año)
                widget: number
                value_type: int
                required: true
                hint: "Año de la vigencia: 2026, 2025, etc."
