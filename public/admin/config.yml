# ============================================
# CONFIGURACION SVELTIA CMS - AGENCIA ITRC
# ============================================
# ARCHIVO GENERADO AUTOMATICAMENTE
# No editar directamente. Modificar los archivos en cms/
# y ejecutar: npm run cms:generate
# ============================================
#
# DESARROLLO LOCAL:
# Sveltia CMS usa la File System Access API del navegador.
# NO necesita servidor proxy. Solo funciona en Chrome o Edge.
#
# 1. Ejecuta: npm run dev
# 2. Abre http://localhost:4321/admin en Chrome o Edge
# 3. El navegador pedira permiso para acceder a la carpeta del proyecto
# 4. Los cambios se guardan directamente en los archivos locales
#
# PRODUCCION (con GitHub):
# Descomenta la seccion 'backend' de abajo y configura OAuth en GitHub
#
# ============================================

backend:
  name: github
  repo: cdavidbm/pitrcastro
  branch: main
  base_url: https://sveltia-cms-auth.cdavidbm.workers.dev
media_folder: public/uploads
public_folder: /uploads
site_url: https://cdavidbm.github.io/pitrcastro
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"
collections:
  # ==========================================
  # INICIO
  # # Pagina principal del sitio
  # ==========================================
  
  - name: home
    label: INICIO
    label_singular: Página de Inicio
    description: Contenido editorial de la página principal
    files:
      - name: home-pagina
        label: Página de Inicio
        file: src/content/pages/home.json
        fields:
          - name: entidadesVigiladas
            label: Entidades vigiladas
            widget: list
            label_singular: Entidad
            collapsed: true
            summary: "{{fields.nombre}}"
            fields:
              - name: nombre
                label: Nombre corto
                widget: string
                required: true
              - name: url
                label: URL externa
                widget: string
                required: true
              - name: logo
                label: Archivo del logo
                widget: string
                required: true
                hint: Nombre del archivo dentro de public/images/entidades/ (ej. dian.png)
              - name: alt
                label: Texto alternativo (accesibilidad)
                widget: string
                required: true
          - name: columnasServicios
            label: Columnas 'Servicios a la Ciudadanía'
            widget: list
            label_singular: Columna
            collapsed: true
            fields:
              - name: items
                label: Enlaces
                widget: list
                label_singular: Enlace
                collapsed: true
                summary: "{{fields.texto}}"
                fields:
                  - name: texto
                    label: Texto del enlace
                    widget: string
                    required: true
                  - name: url
                    label: URL
                    widget: string
                    required: true
                    hint: "Internos: ruta sin slash inicial (ej. glosario). Externos: URL completa con https://"
                  - name: tipo
                    label: Tipo
                    widget: select
                    options:
                      - internal
                      - external
                    default: internal
