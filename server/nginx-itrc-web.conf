# /etc/nginx/sites-available/itrc-web
# Sitio Astro estatico ITRC + Strapi CMS, detras de WAF corporativo.
#
# Arquitectura:
#   Usuario --https--> WAF (cert + dominio publico) --http--> nginx (este) --> Astro + Strapi
#
# El WAF termina TLS y reenvia HTTP. Por eso este nginx solo escucha en :80.
# Para que Strapi/Astro sepan que la peticion original fue https, confiamos en
# los headers X-Forwarded-Proto y X-Forwarded-For que envia el WAF.

# Nota: NO reenviamos el header "Upgrade" al backend. Strapi v5 corre en modo
# "start" (produccion), que no requiere WebSocket. Bloquear Upgrade aqui evita
# H2C smuggling (CWE-444): un atacante no podria pedir upgrade a h2c y saltarse
# los controles del WAF.

# Mapa para detectar el protocolo original (desde el WAF) con fallback al
# esquema local. Asi los redirects y URLs generadas por Strapi salen como
# https://www.itrc.gov.co/... aunque entre desde el WAF como http://.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Acepta tanto el dominio publico (via WAF) como acceso directo por IP
    # interna. El "_" mantiene comportamiento catch-all por si algun probe llega
    # con otro Host.
    server_name www.itrc.gov.co itrc.gov.co 192.168.82.13 _;

    # === Confianza en headers del WAF ===
    # Descomentar cuando el equipo de DNS/WAF entregue la IP (o rango) de salida
    # del WAF. Sin esto los logs muestran la IP del WAF en vez del usuario real,
    # y un atacante con acceso directo a 192.168.82.13 podria spoofear cabeceras.
    #
    # set_real_ip_from <IP_O_RANGO_WAF>;       # ej: 10.20.30.0/24
    # real_ip_header   X-Forwarded-For;
    # real_ip_recursive on;

    root /var/www/itrc-web;
    include /etc/nginx/snippets/itrc-strapi-upload.conf;
    include /etc/nginx/snippets/itrc-wp-legacy-redirects.conf;
    index index.html;

    # Permite uploads grandes (PDFs institucionales, hasta 100 MB)
    client_max_body_size 100M;

    # Security headers
    # HSTS se omite a proposito: lo emite el WAF (que tiene el cert).
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"    always;

    # Healthcheck para que el WAF pueda monitorear el origen sin tocar Strapi.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # === STRAPI: panel admin, API y rutas internas ===
    # Proxy a contenedor docker en 127.0.0.1:1337.
    # nginx por defecto NO reenvia el header Upgrade del cliente al backend
    # (mitiga H2C smuggling, CWE-444). No agregamos proxy_set_header Upgrade
    # en ningun bloque a proposito: Strapi v5 en modo "start" no necesita
    # WebSocket. Si en el futuro hace falta WS, mapear Upgrade SOLO al valor
    # "websocket" y nunca a $http_upgrade directo.
    location /admin {
        proxy_pass http://127.0.0.1:1337;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Endpoints REST publicos (consumidos por Astro en build-time)
    location /api/ {
        proxy_pass http://127.0.0.1:1337;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Internals que el panel Strapi llama a la API admin
    location ~ ^/(content-manager|content-type-builder|upload|users-permissions|i18n|email|content-releases|review-workflows|preview)/ {
        proxy_pass http://127.0.0.1:1337;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Uploads de Strapi (media library) - proxy a contenedor
    location /uploads/ {
        proxy_pass http://127.0.0.1:1337;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # === ASTRO: sitio estatico ===
    location /assets/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /_astro/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /documentos/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    error_page 404 /404.html;

    access_log /var/log/nginx/itrc-web.access.log;
    error_log  /var/log/nginx/itrc-web.error.log;
}
