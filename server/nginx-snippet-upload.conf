# /etc/nginx/snippets/itrc-strapi-upload.conf
#
# Endpoint POST /upload (sin trailing slash) hacia Strapi.
# El bloque regex existente captura /upload/X pero no /upload solo, lo cual
# rompe el endpoint nativo de Media Library de Strapi v5.

location = /upload {
    proxy_pass http://127.0.0.1:1337;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    client_max_body_size 100M;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
