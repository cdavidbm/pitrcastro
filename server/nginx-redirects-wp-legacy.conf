# /etc/nginx/snippets/itrc-wp-legacy-redirects.conf
#
# Redirects 301 desde URLs de WordPress legado a las rutas del portal Astro.
# Generado por auditoría pre-cutover 2026-06-17.
#
# Estos cubren:
#   1) 16 URLs WP cuyo contenido EXISTE en Astro bajo otro slug
#      (resultado de la regla "no clonar slugs" — slugs nuevos más cortos
#      o reorganizados por dominio en el portal nuevo).
#   2) 5 URLs WP cuyo contenido aún no está migrado (vigencias 2022/2025/2026
#      de actos administrativos) — redirigen al catálogo padre para que el
#      usuario vea las vigencias disponibles en vez de un 404 ciego.
#
# Aplicación: incluir esta línea dentro del bloque `server { ... }` de
# /etc/nginx/sites-enabled/itrc-web justo después de `root ...;`:
#
#     include /etc/nginx/snippets/itrc-wp-legacy-redirects.conf;
#
# Luego: `sudo nginx -t && sudo systemctl reload nginx`.

# ============================================================================
# 1) Slug-different: contenido existe, cambió de ruta
# ============================================================================

# --- Agencia ---
location = /mision-vision-y-proposito-estrategico/      { return 301 /agencia/mision-vision; }
location = /perfil-directora-general/                    { return 301 /agencia/equipo-directivo; }
location = /perfil-subdirectores/                        { return 301 /agencia/equipo-directivo; }
location = /sistema-de-control-interno/                  { return 301 /agencia/control-interno; }

# --- Transparencia (raíz + subitems movidos a top-level) ---
location = /transparencia-y-acceso-a-la-informacion-publica/                              { return 301 /transparencia; }
location = /transparencia-y-acceso-a-la-informacion-publica/programa-de-gestion-documental/   { return 301 /programa-gestion-documental; }
location = /transparencia-y-acceso-a-la-informacion-publica/registro-de-activos-de-informacion/ { return 301 /registro-activos-informacion; }

# --- Participa (algunos slugs normalizados + uno con sufijo "-2") ---
location = /participa/diagnostico-e-identificacion-de-problemas-2/  { return 301 /participa/diagnostico-e-identificacion-de-problemas; }
location = /participa/informe-de-gestion-del-comite-de-conciliacion/ { return 301 /informe-de-gestion-del-comite-de-conciliacion; }
location = /participa/otros-de-grupos-de-interes/                    { return 301 /otros-de-grupos-de-interes; }

# --- Prensa (URLs viejas → hub unificado) ---
location = /noticias/                            { return 301 /prensa/noticias; }
location = /comunicados-y-boletines-de-prensa/   { return 301 /prensa/noticias; }
location = /comunicados/                         { return 301 /prensa/noticias; }

# --- Planeación / Rendición ---
location = /planeacion/             { return 301 /participa/planeacion-y-presupuesto-participativo; }
location = /rendicion-de-cuentas/   { return 301 /participa/rendicion-de-cuentas; }

# --- Tablas Retención Documental ---
location = /tablas-de-retencion-documental/  { return 301 /tablas-retencion-documental; }

# ============================================================================
# 2) Fallbacks para contenido no migrado aún — evitan 404 ciego
# ============================================================================
# Vigencias históricas 2022, 2025, 2026 de actos administrativos: el catálogo
# unificado /documentos-de-interes/resoluciones-circulares-y-otros-actos-administrativos
# las irá listando conforme se migren. Por ahora redirigir allá.

location = /vigencia-2022/  { return 301 /documentos-de-interes/resoluciones-circulares-y-otros-actos-administrativos; }
location = /vigencia-2025/  { return 301 /documentos-de-interes/resoluciones-circulares-y-otros-actos-administrativos; }
location = /vigencia-2026/  { return 301 /documentos-de-interes/resoluciones-circulares-y-otros-actos-administrativos; }
location = /documentos-de-interes/resoluciones-circulares-y-otros-actos-administrativos/vigencia-2026/ { return 301 /documentos-de-interes/resoluciones-circulares-y-otros-actos-administrativos; }

# /documentos-de-interes/ (nodo padre 404) → catálogo de resoluciones
location = /documentos-de-interes/  { return 301 /documentos-de-interes/resoluciones-circulares-y-otros-actos-administrativos; }
