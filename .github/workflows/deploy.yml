name: Deploy to test server

on:
  push:
    branches: [main]
    # No disparar deploy cuando el push solo afecta archivos que no influyen
    # en el sitio compilado. Ahorra ~5-7 min por edición de docs.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'CLAUDE.md'
      - 'GEMINI.md'
  # Permite disparar manualmente desde GitHub UI si hace falta
  workflow_dispatch:

# Evita deploys simultáneos sobre el mismo branch.
# Si llegan dos pushes, el segundo espera a que termine el primero (no cancela).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: [self-hosted, itrc-server]
    timeout-minutes: 15

    steps:
      - name: Show deploy context
        # Datos del contexto github vienen de input de usuario (commit author,
        # mensaje, etc.) — nunca interpolar directo en `run:` porque permitiría
        # shell injection. Pasamos por `env:` y citamos como "$VAR".
        env:
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_ACTOR: ${{ github.actor }}
          DEPLOY_TRIGGER: ${{ github.event_name }}
          DEPLOY_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit:    $DEPLOY_SHA"
          echo "Actor:     $DEPLOY_ACTOR"
          echo "Trigger:   $DEPLOY_TRIGGER"
          echo "Message:   $DEPLOY_MESSAGE"
          echo "Started:   $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "DEPLOY_START_TS=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}

      - name: Sync dist/ to webroot
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          if [ -z "${DEPLOY_PATH}" ]; then
            echo "ERROR: DEPLOY_PATH no configurado en repo variables" >&2
            exit 1
          fi
          # --no-o --no-g: no intentar cambiar owner/group de archivos
          # (el runner no es root y archivos existentes pueden tener owner distinto;
          # el grupo lo hereda del setgid del dir parent)
          rsync -a --no-o --no-g --delete \
            --exclude=".DS_Store" \
            --exclude="Thumbs.db" \
            dist/ "${DEPLOY_PATH%/}/"

      - name: Reload nginx
        run: sudo /usr/bin/systemctl reload nginx

      - name: Smoke test
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/)
          if [ "$status" != "200" ]; then
            echo "ERROR: home devolvió HTTP $status" >&2
            exit 1
          fi
          echo "Sitio respondiendo HTTP 200 en localhost"

      - name: Deploy summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_SITE: ${{ vars.SITE_URL }}
        run: |
          end_ts=$(date +%s)
          duration=$((end_ts - DEPLOY_START_TS))
          minutes=$((duration / 60))
          seconds=$((duration % 60))
          echo "===================================="
          echo "  Deploy $JOB_STATUS en ${minutes}m ${seconds}s"
          echo "  Commit: $DEPLOY_SHA"
          echo "  Sitio:  $DEPLOY_SITE"
          echo "===================================="
