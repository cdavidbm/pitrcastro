name: Deploy to test server

on:
  push:
    branches: [main]
    # No disparar deploy cuando el push solo afecta archivos que no influyen
    # en el sitio compilado. Ahorra ~5-7 min por edición de docs.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'CLAUDE.md'
      - 'GEMINI.md'
  # Permite disparar manualmente desde GitHub UI si hace falta
  workflow_dispatch:
  # Disparado por Strapi (webhook) cuando un editor publica/despublica contenido.
  # Strapi POSTea a https://api.github.com/repos/{owner}/{repo}/dispatches con
  # event_type="strapi-publish" — se documenta en cms-strapi/WEBHOOK.md.
  repository_dispatch:
    types: [strapi-publish]

# Evita deploys simultáneos sobre el mismo branch.
# Si llegan dos pushes, el segundo espera a que termine el primero (no cancela).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: [self-hosted, itrc-server]
    timeout-minutes: 15

    steps:
      - name: Show deploy context
        # Datos del contexto github vienen de input de usuario (commit author,
        # mensaje, etc.) — nunca interpolar directo en `run:` porque permitiría
        # shell injection. Pasamos por `env:` y citamos como "$VAR".
        env:
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_ACTOR: ${{ github.actor }}
          DEPLOY_TRIGGER: ${{ github.event_name }}
          DEPLOY_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit:    $DEPLOY_SHA"
          echo "Actor:     $DEPLOY_ACTOR"
          echo "Trigger:   $DEPLOY_TRIGGER"
          echo "Message:   $DEPLOY_MESSAGE"
          echo "Started:   $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "DEPLOY_START_TS=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}
          # STRAPI_URL: URL accesible desde el runner. En el servidor de pruebas
          # con Strapi corriendo en el mismo host: http://127.0.0.1:1337
          # Si la variable no está configurada, src/utils/strapi.ts cae a default.
          STRAPI_URL: ${{ vars.STRAPI_URL }}
          # STRAPI_TOKEN: opcional. Solo necesario si los content types están
          # restringidos. Hoy los públicos están abiertos via bootstrap.
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}

      - name: Sync dist/ to webroot
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          if [ -z "${DEPLOY_PATH}" ]; then
            echo "ERROR: DEPLOY_PATH no configurado en repo variables" >&2
            exit 1
          fi
          # --no-o --no-g: no intentar cambiar owner/group de archivos
          # (el runner no es root y archivos existentes pueden tener owner distinto;
          # el grupo lo hereda del setgid del dir parent)
          # --chmod=Dg+rwX,Fg+rw: garantiza que dirs y archivos creados queden
          # con permisos de grupo escribibles, para que el deploy manual de
          # fallback (admweb, miembro del grupo deploy) pueda sobreescribirlos.
          # --exclude=/documentos/: NO sincronizar /documentos/ desde el repo. El
          # repo solo tiene commiteados ciprep/ninos/relatorias (~50 MB); los demás
          # ~3.5 GB de binarios viven solo en el filesystem del servidor (rsync
          # manual desde local del operador hasta que exista el endpoint custom).
          # Sin esta exclusión, --delete borraría todos los binarios no-commiteados
          # en cada deploy automático.
          rsync -a --no-o --no-g --chmod=Dg+rwX,Fg+rw --delete \
            --exclude=".DS_Store" \
            --exclude="Thumbs.db" \
            --exclude="/documentos/" \
            dist/ "${DEPLOY_PATH%/}/"

      - name: Reload nginx
        run: sudo /usr/bin/systemctl reload nginx

      - name: Smoke test
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/)
          if [ "$status" != "200" ]; then
            echo "ERROR: home devolvió HTTP $status" >&2
            exit 1
          fi
          echo "Sitio respondiendo HTTP 200 en localhost"

      - name: Deploy summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_SITE: ${{ vars.SITE_URL }}
        run: |
          end_ts=$(date +%s)
          duration=$((end_ts - DEPLOY_START_TS))
          minutes=$((duration / 60))
          seconds=$((duration % 60))
          echo "===================================="
          echo "  Deploy $JOB_STATUS en ${minutes}m ${seconds}s"
          echo "  Commit: $DEPLOY_SHA"
          echo "  Sitio:  $DEPLOY_SITE"
          echo "===================================="
